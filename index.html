<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Torch Veil | Free Keyless MM2 Scripts</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .neon { text-shadow: 0 0 25px #e5e7eb; }
    .blink { animation: blink 1.4s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .fade-in { opacity: 0; animation: fadeIn 1s forwards; }
    @keyframes fadeIn { to { opacity: 1; } }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen transition-all duration-300">

<div class="max-w-6xl mx-auto px-6 py-8">

  <!-- Top Nav -->
  <nav class="flex justify-between items-center mb-16 border-b border-gray-800 pb-6">
    <div class="flex items-center gap-3">
      <span class="text-3xl">💀</span>
      <h1 class="text-3xl font-bold tracking-widest">TORCH VEIL</h1>
    </div>

    <div class="flex items-center gap-6">
      <!-- Desktop Menu -->
      <div class="hidden md:flex gap-8 text-sm text-gray-400">
        <a href="#scripts" class="hover:text-white transition">Scripts</a>
        <a href="#howto" class="hover:text-white transition">How to run</a>
        <a href="https://www.youtube.com/@ScriptDox" target="_blank" class="hover:text-white transition">Channel</a>
        <a href="#faq" class="hover:text-white transition">FAQ</a>
      </div>

      <!-- Dark Mode Toggle -->
      <button onclick="toggleDarkMode()" id="theme-toggle" class="p-3 rounded-2xl bg-zinc-900 hover:bg-zinc-800 transition">
        <i class="fas fa-moon text-lg"></i>
      </button>

      <!-- Mobile Hamburger -->
      <button onclick="toggleMobileMenu()" class="md:hidden p-3 rounded-2xl bg-zinc-900 hover:bg-zinc-800 transition">
        <i class="fas fa-bars text-xl" id="menu-icon"></i>
      </button>
    </div>
  </nav>

  <!-- Mobile Menu -->
  <div id="mobile-menu" class="hidden fixed inset-0 bg-zinc-950 z-50 pt-24 px-6 md:hidden">
    <div class="flex flex-col gap-8 text-lg">
      <a href="#scripts" onclick="toggleMobileMenu()" class="py-4 border-b border-gray-800">Scripts</a>
      <a href="#howto" onclick="toggleMobileMenu()" class="py-4 border-b border-gray-800">How to run</a>
      <a href="https://www.youtube.com/@ScriptDox" target="_blank" onclick="toggleMobileMenu()" class="py-4 border-b border-gray-800">Channel</a>
      <a href="#faq" onclick="toggleMobileMenu()" class="py-4 border-b border-gray-800">FAQ</a>
    </div>
  </div>

  <!-- Rest of your content (Hero + Profile + Scripts + How to run + FAQ) -->
  <!-- ... (I kept it short here to save space, but it's the same as previous) -->

</div>

<script>
function copyScript(btn) {
  const pre = btn.previousElementSibling;
  const text = pre.innerText.trim();
  navigator.clipboard.writeText(text).then(() => {
    const original = btn.innerHTML;
    btn.innerHTML = '✅ Copied!';
    setTimeout(() => btn.innerHTML = original, 2000);
  });
}

function toggleDarkMode() {
  document.documentElement.classList.toggle('dark');
  const icon = document.getElementById('theme-toggle').querySelector('i');
  if (document.documentElement.classList.contains('dark')) {
    icon.classList.remove('fa-moon');
    icon.classList.add('fa-sun');
  } else {
    icon.classList.remove('fa-sun');
    icon.classList.add('fa-moon');
  }
}

function toggleMobileMenu() {
  const menu = document.getElementById('mobile-menu');
  const icon = document.getElementById('menu-icon');
  menu.classList.toggle('hidden');
  icon.classList.toggle('fa-bars');
  icon.classList.toggle('fa-times');
}
</script>

</body>
</html>
